services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: fortune-api:local
    container_name: fortune-api
    ports:
      - "3100:3100"
    environment:
      NODE_ENV: production
      PORT: 3100
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@fortune.local}
    volumes:
      - fortune-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE: http://localhost:3100
    image: fortune-web:local
    container_name: fortune-web
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  fortune-data:
